name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Ruff lint (all rules)
        run: python -m ruff check .
      - name: Mypy strict types
        run: python -m mypy
      - name: Bandit security scan
        run: python -m bandit -q -c pyproject.toml -r src tests
      - name: Dependency vulnerability audit
        run: python -m pip_audit --progress-spinner off --strict .
      - name: Run tests
        run: python -m pytest -q
      - name: Smoke-test MCP stdio
        run: |
          python -m mc3000_mcp.server <<'EOF'
          {"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05"}}
          {"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}
          {"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"mc3000_build_profile","arguments":{"slot_mask":1}}}
          EOF
